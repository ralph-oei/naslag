<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Naslag — spike B (Apps Script login)</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F4EFE6">
<style>
*{box-sizing:border-box}
body{font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;
  background:#F4EFE6;color:#22201b;padding:calc(env(safe-area-inset-top) + 24px) 20px 60px}
@media(prefers-color-scheme:dark){body{background:#15140F;color:#EDE7D8}}
.wrap{max-width:640px;margin:0 auto}
h1{font-size:22px;margin:0 0 4px}
.mode{display:inline-block;font-size:12.5px;font-weight:700;padding:4px 10px;border-radius:999px;margin:6px 0 20px}
.mode.standalone{background:#2E6E57;color:#fff}
.mode.browser{background:#B87220;color:#fff}
label{display:block;font-size:13px;font-weight:600;margin:16px 0 6px}
input{width:100%;font:14px/1.4 ui-monospace,Menlo,monospace;padding:12px;border-radius:10px;
  border:1px solid rgba(40,34,20,.28);background:#FBF8F2}
@media(prefers-color-scheme:dark){input{background:#1D1B15;color:#EDE7D8;border-color:rgba(240,232,214,.24)}}
button{margin-top:16px;width:100%;font-size:16px;font-weight:600;padding:15px;border:none;
  border-radius:12px;background:#2E6E57;color:#fff;cursor:pointer}
button:active{transform:translateY(1px)}
.log{margin-top:24px;font:13.5px/1.55 ui-monospace,Menlo,monospace;white-space:pre-wrap;
  background:#FBF8F2;border:1px solid rgba(40,34,20,.14);border-radius:12px;padding:16px;min-height:80px}
@media(prefers-color-scheme:dark){.log{background:#1D1B15;border-color:rgba(240,232,214,.12)}}
.ok{color:#2E6E57;font-weight:700}
.bad{color:#B23A2E;font-weight:700}
.hint{font-size:13px;color:#6B655A;margin-top:14px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Naslag — spike B</h1>
  <div>Apps Script als login-makelaar → PWA leest Drive direct.</div>
  <div class="mode" id="mode">…</div>

  <label for="url">Apps Script web-app-URL (eindigt op <code>/exec</code>)</label>
  <input id="url" placeholder="https://script.google.com/macros/s/…/exec" autocapitalize="off" autocorrect="off" spellcheck="false">
  <button id="go">Test inloggen met Google</button>
  <div class="hint">Voor de echte test: voeg deze pagina toe aan je beginscherm en open 'm daarvandaan (standalone), niet in een Safari-tab.</div>

  <div class="log" id="log">Klaar om te testen.</div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const logEl = $('log');
function log(msg, cls){ logEl.innerHTML += '\n' + (cls ? '<span class="'+cls+'">'+msg+'</span>' : msg); }
function setLog(msg){ logEl.textContent = msg; }

// Draaimodus tonen (dit is de kern van de spike).
const standalone = window.navigator.standalone === true ||
  window.matchMedia('(display-mode: standalone)').matches;
$('mode').textContent = standalone ? '● standalone (beginscherm-app)' : '● browser-tab';
$('mode').className = 'mode ' + (standalone ? 'standalone' : 'browser');

// Onthoud de script-URL over de redirect heen.
const savedUrl = localStorage.getItem('naslag_spike_url');
if (savedUrl) $('url').value = savedUrl;

$('go').addEventListener('click', () => {
  const u = $('url').value.trim();
  if (!/^https:\/\/script\.google\.com\/.+\/exec$/.test(u)) {
    setLog(''); log('URL lijkt niet te kloppen (moet op /exec eindigen).', 'bad'); return;
  }
  localStorage.setItem('naslag_spike_url', u);
  const back = location.origin + location.pathname;   // deze pagina, zonder fragment
  const sep = u.includes('?') ? '&' : '?';
  setLog('Doorsturen naar Google-autorisatie…');
  location.href = u + sep + 'redirect=' + encodeURIComponent(back);
});

// Terug uit de redirect? Dan staat het token in de fragment.
(function handleReturn(){
  const m = location.hash.match(/naslag_token=([^&]+)/);
  if (!m) return;
  const token = decodeURIComponent(m[1]);
  history.replaceState(null, '', location.pathname);   // fragment uit de URL
  setLog('');
  log('✓ Token ontvangen uit de redirect (' + token.length + ' tekens).', 'ok');
  log(standalone ? '✓ En we zijn terug ín de standalone-app.' : '(terug in een browser-tab)',
      standalone ? 'ok' : null);
  testDrive(token);
})();

async function testDrive(token){
  const h = { Authorization: 'Bearer ' + token };
  try {
    log('\nDrive-call 1: wie ben ik…');
    const a = await fetch('https://www.googleapis.com/drive/v3/about?fields=user(displayName,emailAddress)', { headers: h });
    if (!a.ok) throw new Error('about ' + a.status + ' ' + (await a.text()).slice(0,120));
    const au = await a.json();
    log('✓ ' + au.user.displayName + ' <' + au.user.emailAddress + '>', 'ok');

    log('\nDrive-call 2: 5 recente bestanden…');
    const f = await fetch('https://www.googleapis.com/drive/v3/files?pageSize=5&orderBy=modifiedTime desc&fields=files(name,mimeType)', { headers: h });
    if (!f.ok) throw new Error('files ' + f.status + ' ' + (await f.text()).slice(0,120));
    const fj = await f.json();
    (fj.files || []).forEach(x => log('  • ' + x.name));
    log('\n✓✓ SPIKE GESLAAGD: token werkt cross-origin tegen de Drive-API.', 'ok');
  } catch (err) {
    log('\n✗ Drive-call mislukt: ' + err.message, 'bad');
  }
}
</script>
</body>
</html>
